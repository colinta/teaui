name: Prettier

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: write
  workflows: write

jobs:
  prettier:
    runs-on: ubuntu-latest
    if: github.actor != 'teaui[bot]'

    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref || github.ref_name }}

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Run Prettier
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            pnpm prettier --check .
          else
            pnpm prettier --write .
          fi

      - name: Commit changes
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "style: format with prettier"
          commit_author: "teaui[bot] <bot@teaui.dev>"
